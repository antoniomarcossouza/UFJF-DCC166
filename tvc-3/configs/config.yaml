training:
  balancing_strategies:
    - "none"
    - "class_weight"
    - "smote"
  models:
    - "logistic_regression"
    - "random_forest"
    - "xgboost"
    - "lightgbm"
  primary_task: "multiclass"
  n_optuna_trials: 30

risk:
  critical: 0.95
  high: 0.80
  medium: 0.60

mlflow:
  experiment_name: "iot-security-sad"
  tracking_uri: "sqlite:///mlruns/mlflow.db"

shap:
  sample_size: 500

simulation:
  interval_seconds: 1.0
  max_events: 200
  benign_ratio: 0.5
  buffer_size: 1000
  bootstrap_on_start: 200
  tick_per_refresh: 3
